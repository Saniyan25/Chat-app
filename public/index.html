<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baat</title>
    <style>
        * { margin: 0; padding: 0; box-box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #dadbd4; }
        
        /* Main Container */
        .chat-container { width: 100%; max-width: 900px; height: 95vh; background: #efeae2; display: flex; flex-direction: column; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-radius: 10px; overflow: hidden; }
        
        /* WhatsApp Header */
        .header { background: #008069; color: white; padding: 15px 20px; display: flex; align-items: center; gap: 15px; font-weight: bold; }
        .avatar { width: 40px; height: 40px; background: #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        /* Message Area */
        .messages-area { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-image: url('https://githubusercontent.com'); }
        .msg { max-width: 65%; padding: 8px 14px; border-radius: 8px; font-size: 15px; line-height: 1.4; word-wrap: break-word; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        
        /* Message Types */
        .msg.received { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .msg.sent { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .msg-meta { font-size: 10px; color: #667781; text-align: right; margin-top: 4px; }

        /* Input Form */
        .input-bar { background: #f0f2f5; padding: 10px 20px; display: flex; gap: 10px; align-items: center; }
        .input-bar input { flex-grow: 1; padding: 12px; border: none; border-radius: 8px; outline: none; font-size: 15px; }
        .input-bar button { background: #008069; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .input-bar button:hover { background: #006e5a; }
    </style>
</head>
<body>

    <!-- Everything must stay cleanly nested inside this ONE container -->
    <div class="chat-container">
        
        <!-- 1. Header -->
        <div class="header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="avatar">💬</div>
                <div>Miya biwi time</div>
            </div>
            <button id="nudge-btn" style="background: #128c7e; color: white; border: 1px solid #ffffff50; padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer;">🔔 Call Friend</button>
        </div>

        <!-- 2. Message Area -->
        <div class="messages-area" id="messages-area"></div>

        <!-- 3. Typing Indicator -->
        <div id="typing-indicator" style="padding: 5px 20px; font-size: 13px; color: #667781; font-style: italic; min-height: 25px;"></div>

        <!-- 4. Input Form (MUST be inside the chat-container wrapper) -->
        <form class="input-bar" id="chat-form">
            <input id="message-input" autocomplete="off" placeholder="Type a message" required />
            <button type="submit">Send</button>
        </form>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
const form = document.getElementById('chat-form');
const input = document.getElementById('message-input');
const messagesArea = document.getElementById('messages-area');
const typingIndicator = document.getElementById('typing-indicator');
const nudgeBtn = document.getElementById('nudge-btn');

let typingTimeout;

// SAFE PERMISSION CHECK: iPhones require a "try/catch" or "promise" handler 
// or they will crash if asked for permissions automatically on load.
try {
    if (window.Notification && Notification.permission !== "granted" && Notification.permission !== "denied") {
        Notification.requestPermission();
    }
} catch (e) {
    console.log("Automatic notifications not supported on this mobile browser.");
}

// Helper function to safely send alerts without crashing mobile devices
function sendNotification(title, bodyText) {
    if (document.visibilityState === "visible") return;

    // Check if the browser even supports Notifications (safari fallback)
    if (window.Notification && Notification.permission === "granted") {
        new Notification(title, {
            body: bodyText,
            icon: "https://flaticon.com"
        });
    } else {
        // Safe fallback alert that works on all iPhones and PCs alike
        console.log(`Notification blocked or unsupported: ${title} - ${bodyText}`);
    }
}

// 1. Send text messages
form.addEventListener('submit', (e) => {
    e.preventDefault();
    if (input.value.trim()) {
        const messageData = { text: input.value, sender: socket.id };
        socket.emit('chat message', messageData);
        input.value = '';

        // Instantly stop typing status when sending
        socket.emit('stop typing');
    }
});

// 2. Detect when the user is typing
input.addEventListener('keypress', () => {
    socket.emit('start typing');

    // Clear old timer if user keeps typing
    clearTimeout(typingTimeout);

    // If user stops typing for 2 seconds, tell the server
    typingTimeout = setTimeout(() => {
        socket.emit('stop typing');
    }, 2000);
});

// 3. Send a room nudge/alert
nudgeBtn.addEventListener('click', () => {
    // If iPhone hasn't granted permission yet, ask safely when they tap the button
    try {
        if (window.Notification && Notification.permission !== "granted") {
            Notification.requestPermission();
        }
    } catch(e) {}

    socket.emit('send nudge');
    alert("Sent a notification nudge to the room!");
});

// LISTENERS FROM SERVER
socket.on('chat message', (data) => {
    const msgElement = document.createElement('div');
    msgElement.className = data.sender === socket.id ? 'msg sent' : 'msg received';
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    msgElement.innerHTML = `${data.text} <div class="msg-meta">${time}</div>`;
    messagesArea.appendChild(msgElement);
    messagesArea.scrollTop = messagesArea.scrollHeight;
    if (!isMe) {
        sendNotification("New Message", data.text);
    }
});

// Show typing banner
socket.on('user typing', () => {
    typingIndicator.textContent = "Someone is typing...";
});

// Hide typing banner
socket.on('user stop typing', () => {
    typingIndicator.textContent = "";
});

// Receive nudge alert
socket.on('receive nudge', () => {
    sendNotification("Miya biwi time", "🚨 Your Jaan is waiting for you!");
    alert("🚨 Miya biwi time", "🚨 Your Jaan is waiting for you!");
});

    </script>
</body>
</html>
